<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Loading Issue</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #d1ecf1; border-color: #bee5eb; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug Loading Issue</h1>
        
        <div class="test-section info">
            <h2>Server Status</h2>
            <p><strong>Frontend:</strong> <span id="frontend-status">Checking...</span></p>
            <p><strong>Backend:</strong> <span id="backend-status">Checking...</span></p>
        </div>

        <div class="test-section">
            <h2>Tests</h2>
            <button onclick="testFrontend()">Test Frontend</button>
            <button onclick="testBackend()">Test Backend</button>
            <button onclick="testAuthFlow()">Test Auth Flow</button>
            <button onclick="clearStorage()">Clear Storage</button>
        </div>

        <div class="test-section">
            <h2>Results</h2>
            <div id="results"></div>
        </div>

        <div class="test-section info">
            <h2>Direct Links</h2>
            <p><a href="http://localhost:8081/" target="_blank">Frontend: http://localhost:8081/</a></p>
            <p><a href="http://localhost:8080/api/health" target="_blank">Backend: http://localhost:8080/api/health</a></p>
        </div>
    </div>

    <script>
        function showResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML += `<div class="test-section ${type}">${message}</div>`;
        }

        async function testFrontend() {
            try {
                const startTime = Date.now();
                const response = await fetch('http://localhost:8081/');
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                if (response.ok) {
                    const html = await response.text();
                    document.getElementById('frontend-status').textContent = `✅ Working (${duration}ms)`;
                    showResult(`✅ Frontend responding in ${duration}ms<br>Status: ${response.status}<br>Content length: ${html.length} chars`, 'success');
                } else {
                    document.getElementById('frontend-status').textContent = `❌ Error ${response.status}`;
                    showResult(`❌ Frontend error: ${response.status}`, 'error');
                }
            } catch (error) {
                document.getElementById('frontend-status').textContent = '❌ Not reachable';
                showResult(`❌ Frontend not reachable: ${error.message}`, 'error');
            }
        }

        async function testBackend() {
            try {
                const startTime = Date.now();
                const response = await fetch('http://localhost:8080/api/health');
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('backend-status').textContent = `✅ Working (${duration}ms)`;
                    showResult(`✅ Backend responding in ${duration}ms<br><pre>${JSON.stringify(data, null, 2)}</pre>`, 'success');
                } else {
                    document.getElementById('backend-status').textContent = `❌ Error ${response.status}`;
                    showResult(`❌ Backend error: ${response.status}`, 'error');
                }
            } catch (error) {
                document.getElementById('backend-status').textContent = '❌ Not reachable';
                showResult(`❌ Backend not reachable: ${error.message}`, 'error');
            }
        }

        async function testAuthFlow() {
            try {
                // Test login
                const loginResponse = await fetch('http://localhost:8080/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@example.com', password: '123456' })
                });
                
                if (loginResponse.ok) {
                    const loginData = await loginResponse.json();
                    showResult(`✅ Login successful<br><pre>${JSON.stringify(loginData, null, 2)}</pre>`, 'success');
                    
                    // Test admin check
                    const adminResponse = await fetch(`http://localhost:8080/api/auth/admin/check/${loginData.session.user.id}`, {
                        headers: { 'Authorization': `Bearer ${loginData.session.access_token}` }
                    });
                    
                    if (adminResponse.ok) {
                        const adminData = await adminResponse.json();
                        showResult(`✅ Admin check successful<br><pre>${JSON.stringify(adminData, null, 2)}</pre>`, 'success');
                    } else {
                        showResult(`❌ Admin check failed: ${adminResponse.status}`, 'error');
                    }
                } else {
                    showResult(`❌ Login failed: ${loginResponse.status}`, 'error');
                }
            } catch (error) {
                showResult(`❌ Auth flow error: ${error.message}`, 'error');
            }
        }

        function clearStorage() {
            localStorage.clear();
            showResult('✅ LocalStorage cleared', 'success');
        }

        // Auto-run tests
        window.onload = function() {
            testFrontend();
            testBackend();
        };
    </script>
</body>
</html>
