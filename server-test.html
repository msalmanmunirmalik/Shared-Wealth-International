<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Test</title>
</head>
<body>
    <h1>Server Test</h1>
    <p>Testing server response...</p>
    <div id="status">Loading...</div>
    
    <script>
        console.log('Test page loaded');
        
        // Test if we can reach the backend
        fetch('http://localhost:8080/api/health')
            .then(response => response.json())
            .then(data => {
                document.getElementById('status').innerHTML = 'Backend: ✅ Working<br>' + JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('status').innerHTML = 'Backend: ❌ Error - ' + error.message;
            });
    </script>
</body>
</html>
