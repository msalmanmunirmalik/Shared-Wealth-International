<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Status Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #d1ecf1; border-color: #bee5eb; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Admin Status Test</h1>
        
        <div class="test-section info">
            <h2>Current Status</h2>
            <p><strong>Session:</strong> <span id="session-status">Not checked</span></p>
            <p><strong>User:</strong> <span id="user-status">Not checked</span></p>
            <p><strong>Admin Status:</strong> <span id="admin-status">Not checked</span></p>
        </div>

        <div class="test-section">
            <h2>Quick Tests</h2>
            <button onclick="checkLocalStorage()">Check LocalStorage</button>
            <button onclick="testAdminLogin()">Test Admin Login</button>
            <button onclick="testAdminCheck()">Test Admin Check</button>
            <button onclick="clearStorage()">Clear Storage</button>
        </div>

        <div class="test-section">
            <h2>Test Results</h2>
            <div id="results"></div>
        </div>

        <div class="test-section info">
            <h2>Access URLs</h2>
            <p><strong>Main App:</strong> <a href="http://localhost:8081" target="_blank">http://localhost:8081</a></p>
            <p><strong>Admin Page:</strong> <a href="http://localhost:8081/admin" target="_blank">http://localhost:8081/admin</a></p>
        </div>
    </div>

    <script>
        function showResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML += `<div class="test-section ${type}">${message}</div>`;
        }

        function checkLocalStorage() {
            const session = localStorage.getItem('session');
            const user = localStorage.getItem('user');
            const isAdmin = localStorage.getItem('isAdmin');
            
            document.getElementById('session-status').textContent = session ? '✅ Found' : '❌ Not found';
            document.getElementById('user-status').textContent = user ? '✅ Found' : '❌ Not found';
            document.getElementById('admin-status').textContent = isAdmin ? `✅ ${isAdmin}` : '❌ Not found';
            
            showResult(`LocalStorage Check:<br>
                Session: ${session ? 'Found' : 'Not found'}<br>
                User: ${user ? 'Found' : 'Not found'}<br>
                Admin: ${isAdmin || 'Not found'}<br>
                <pre>${JSON.stringify({session: session ? JSON.parse(session) : null, user: user ? JSON.parse(user) : null, isAdmin}, null, 2)}</pre>`, 'info');
        }

        async function testAdminLogin() {
            try {
                const response = await fetch('http://localhost:8080/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@example.com', password: '123456' })
                });
                
                const data = await response.json();
                
                if (response.ok && data.session) {
                    // Store in localStorage like the app does
                    localStorage.setItem('session', JSON.stringify(data.session));
                    localStorage.setItem('user', JSON.stringify(data.session.user));
                    
                    showResult('✅ Admin login successful!<br><pre>' + JSON.stringify(data, null, 2) + '</pre>', 'success');
                    
                    // Update status
                    checkLocalStorage();
                } else {
                    showResult('❌ Admin login failed: ' + (data.message || 'Unknown error'), 'error');
                }
            } catch (error) {
                showResult('❌ Admin login error: ' + error.message, 'error');
            }
        }

        async function testAdminCheck() {
            try {
                const session = localStorage.getItem('session');
                if (!session) {
                    showResult('❌ No session found. Please login first.', 'error');
                    return;
                }
                
                const sessionData = JSON.parse(session);
                const userId = sessionData.user.id;
                const token = sessionData.access_token;
                
                const response = await fetch(`http://localhost:8080/api/auth/admin/check/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('isAdmin', data.isAdmin.toString());
                    showResult(`✅ Admin check successful!<br><pre>${JSON.stringify(data, null, 2)}</pre>`, 'success');
                    checkLocalStorage();
                } else {
                    showResult('❌ Admin check failed: ' + (data.message || 'Unknown error'), 'error');
                }
            } catch (error) {
                showResult('❌ Admin check error: ' + error.message, 'error');
            }
        }

        function clearStorage() {
            localStorage.removeItem('session');
            localStorage.removeItem('user');
            localStorage.removeItem('isAdmin');
            localStorage.removeItem('isDemoMode');
            
            document.getElementById('session-status').textContent = 'Cleared';
            document.getElementById('user-status').textContent = 'Cleared';
            document.getElementById('admin-status').textContent = 'Cleared';
            
            showResult('✅ LocalStorage cleared', 'success');
        }

        // Auto-check on page load
        window.onload = function() {
            checkLocalStorage();
        };
    </script>
</body>
</html>
