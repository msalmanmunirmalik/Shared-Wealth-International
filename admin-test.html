<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #d1ecf1; border-color: #bee5eb; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Admin Page Test</h1>
        
        <div class="test-section info">
            <h2>Current Server Status</h2>
            <p><strong>Backend:</strong> <span id="backend-status">Checking...</span></p>
            <p><strong>Frontend:</strong> <span id="frontend-status">Checking...</span></p>
            <p><strong>Admin Page:</strong> <span id="admin-status">Checking...</span></p>
        </div>

        <div class="test-section">
            <h2>Quick Tests</h2>
            <button onclick="testBackend()">Test Backend</button>
            <button onclick="testFrontend()">Test Frontend</button>
            <button onclick="testAdminLogin()">Test Admin Login</button>
            <button onclick="testAdminPage()">Test Admin Page</button>
        </div>

        <div class="test-section">
            <h2>Test Results</h2>
            <div id="results"></div>
        </div>

        <div class="test-section info">
            <h2>Access URLs</h2>
            <p><strong>Frontend:</strong> <a href="http://localhost:8083" target="_blank">http://localhost:8083</a></p>
            <p><strong>Admin Page:</strong> <a href="http://localhost:8083/admin" target="_blank">http://localhost:8083/admin</a></p>
            <p><strong>Backend API:</strong> <a href="http://localhost:8080/api/health" target="_blank">http://localhost:8080/api/health</a></p>
        </div>
    </div>

    <script>
        function showResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML += `<div class="test-section ${type}">${message}</div>`;
        }

        async function testBackend() {
            try {
                const response = await fetch('http://localhost:8080/api/health');
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('backend-status').textContent = '✅ Running';
                    showResult('✅ Backend is healthy!<br><pre>' + JSON.stringify(data, null, 2) + '</pre>', 'success');
                } else {
                    document.getElementById('backend-status').textContent = '❌ Error';
                    showResult('❌ Backend error: ' + data.message, 'error');
                }
            } catch (error) {
                document.getElementById('backend-status').textContent = '❌ Not reachable';
                showResult('❌ Backend not reachable: ' + error.message, 'error');
            }
        }

        async function testFrontend() {
            try {
                const response = await fetch('http://localhost:8083/');
                const html = await response.text();
                
                if (response.ok && html.includes('Shared Wealth')) {
                    document.getElementById('frontend-status').textContent = '✅ Running';
                    showResult('✅ Frontend is running!', 'success');
                } else {
                    document.getElementById('frontend-status').textContent = '❌ Error';
                    showResult('❌ Frontend error: ' + response.status, 'error');
                }
            } catch (error) {
                document.getElementById('frontend-status').textContent = '❌ Not reachable';
                showResult('❌ Frontend not reachable: ' + error.message, 'error');
            }
        }

        async function testAdminLogin() {
            try {
                const response = await fetch('http://localhost:8080/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@example.com', password: '123456' })
                });
                
                const data = await response.json();
                
                if (response.ok && data.session) {
                    showResult('✅ Admin login successful!<br><pre>' + JSON.stringify(data, null, 2) + '</pre>', 'success');
                } else {
                    showResult('❌ Admin login failed: ' + (data.message || 'Unknown error'), 'error');
                }
            } catch (error) {
                showResult('❌ Admin login error: ' + error.message, 'error');
            }
        }

        async function testAdminPage() {
            try {
                const response = await fetch('http://localhost:8083/admin');
                const html = await response.text();
                
                if (response.ok) {
                    document.getElementById('admin-status').textContent = '✅ Accessible';
                    showResult('✅ Admin page is accessible!', 'success');
                } else {
                    document.getElementById('admin-status').textContent = '❌ Error';
                    showResult('❌ Admin page error: ' + response.status, 'error');
                }
            } catch (error) {
                document.getElementById('admin-status').textContent = '❌ Not reachable';
                showResult('❌ Admin page not reachable: ' + error.message, 'error');
            }
        }

        // Auto-run tests on page load
        window.onload = function() {
            testBackend();
            testFrontend();
            testAdminPage();
        };
    </script>
</body>
</html>
